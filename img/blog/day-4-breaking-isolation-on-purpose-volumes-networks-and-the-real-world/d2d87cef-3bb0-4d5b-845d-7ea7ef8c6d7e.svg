<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#2D2B1A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="300" r="280" fill="#F59E0B" opacity="0.06"/>

  <rect x="60" y="50" width="100" height="40" rx="20" fill="#F59E0B"/>
  <text x="110" y="77" text-anchor="middle" font-size="18" font-weight="800" fill="#0F172A">DAY 4</text>
  <text x="180" y="77" font-size="16" fill="#64748B">7 Days of Docker (2026)</text>

  <text x="60" y="180" font-size="50" font-weight="800" fill="white" letter-spacing="-1.5">Breaking Isolation</text>
  <text x="60" y="248" font-size="54" font-weight="800" fill="#F59E0B" letter-spacing="-1.5">On Purpose</text>
  <text x="60" y="310" font-size="28" fill="#94A3B8">Volumes + Networks + Port Mapping</text>

  <rect x="60" y="360" width="160" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="140" y="384" text-anchor="middle" font-size="14" font-weight="600" fill="#38BDF8">Volumes</text>
  <rect x="240" y="360" width="190" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="335" y="384" text-anchor="middle" font-size="14" font-weight="600" fill="#22C55E">Bind Mounts</text>
  <rect x="450" y="360" width="210" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="555" y="384" text-anchor="middle" font-size="14" font-weight="600" fill="#A78BFA">Custom Networks</text>
  <rect x="680" y="360" width="140" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="750" y="384" text-anchor="middle" font-size="14" font-weight="600" fill="#F59E0B">DNS</text>

  <!-- Terminal -->
  <rect x="700" y="120" width="440" height="200" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="700" y="120" width="440" height="30" rx="12" fill="#334155"/>
  <circle cx="720" cy="135" r="5" fill="#EF4444"/><circle cx="738" cy="135" r="5" fill="#FBBF24"/><circle cx="756" cy="135" r="5" fill="#22C55E"/>
  <text x="720" y="175" font-size="12" font-family="monospace" fill="#22C55E">$ docker exec api ping web</text>
  <text x="720" y="198" font-size="12" font-family="monospace" fill="#94A3B8">64 bytes from 172.22.0.2: time=0.721ms</text>
  <text x="720" y="221" font-size="12" font-family="monospace" fill="#22C55E">$ redis-cli -h redis GET greeting</text>
  <text x="720" y="244" font-size="12" font-family="monospace" fill="#F59E0B">"Hello Day 4!"</text>
  <text x="720" y="275" font-size="11" font-family="monospace" fill="#64748B"># Containers talk by NAME. No IPs.</text>
  <text x="720" y="298" font-size="11" font-family="monospace" fill="#64748B"># Data survives container death.</text>

  <text x="60" y="560" font-size="18" font-weight="600" fill="#E2E8F0">Saloni Narang</text>
  <text x="60" y="585" font-size="14" fill="#64748B">Docker Captain  ·  CNCF Ambassador</text>
  <rect x="60" y="460" width="60" height="4" rx="2" fill="#F59E0B"/>
</svg>