<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1160" viewBox="0 0 1600 1160">
  <rect width="1600" height="1160" fill="#ffffff"/>
  <style>
    .title { font: 900 46px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
    .subtitle { font: 600 25px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
    .h { font: 900 31px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .body { font: 600 24px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
    .formula { font: 850 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
  </style>

  <text x="800" y="78" class="title" text-anchor="middle">Microscaling: how NVFP4 makes 4-bit useful</text>
  <text x="800" y="120" class="subtitle" text-anchor="middle">Tiny FP4 values become useful when each small block gets its own scale</text>

  <g transform="translate(90 185)">
    <rect width="650" height="335" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="36" y="58" class="h" fill="#9a3412">Problem: one giant ruler</text>
    <text x="36" y="110" class="body">A single scale must cover small weights</text>
    <text x="36" y="145" class="body">and one big outlier at the same time.</text>
    <text x="36" y="180" class="body">Small values round together, so quality falls.</text>
    <rect x="42" y="238" width="48" height="34" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="110" y="232" width="48" height="40" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="178" y="226" width="48" height="46" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="246" y="220" width="48" height="52" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="314" y="214" width="48" height="58" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="382" y="208" width="48" height="64" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="450" y="202" width="48" height="70" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="2"/>
    <rect x="535" y="154" width="62" height="118" rx="10" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="566" y="304" class="body" text-anchor="middle" fill="#991b1b">outlier</text>
  </g>

  <g transform="translate(860 185)">
    <rect width="650" height="335" rx="20" fill="#f0fdf4" stroke="#76b900" stroke-width="2"/>
    <text x="36" y="58" class="h" fill="#166534">Fix: small block rulers</text>
    <text x="36" y="110" class="body">NVFP4 groups 16 FP4 values.</text>
    <text x="36" y="145" class="body">Each group gets a local FP8 scale.</text>
    <text x="36" y="180" class="body">The tensor also keeps one global FP32 scale.</text>
    <rect x="42" y="228" width="48" height="44" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="110" y="224" width="48" height="48" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="178" y="220" width="48" height="52" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="246" y="216" width="48" height="56" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="314" y="212" width="48" height="60" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="382" y="208" width="48" height="64" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="450" y="204" width="48" height="68" rx="9" fill="#dcfce7" stroke="#76b900" stroke-width="2"/>
    <rect x="535" y="188" width="62" height="84" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="566" y="304" class="body" text-anchor="middle" fill="#5b21b6">scale</text>
  </g>

  <line x1="800" y1="555" x2="800" y2="650" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>

  <rect x="220" y="665" width="1160" height="145" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="260" y="722" class="h" fill="#172033">NVFP4 storage</text>
  <text x="260" y="770" class="formula">16 x FP4 E2M1 values + 1 x FP8 E4M3 block scale + 1 x FP32 tensor scale</text>

  <rect x="220" y="860" width="1160" height="155" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="914" class="h" fill="#1e3a8a">Why this helps</text>
  <text x="260" y="962" class="body">The 4-bit code only has to describe position inside a local range,</text>
  <text x="260" y="997" class="body">instead of trying to cover the whole model with one giant scale.</text>

  <text x="800" y="1085" class="body" text-anchor="middle" fill="#9a3412">Still not magic: outliers, calibration data, model type, and task difficulty can all change quality.</text>
</svg>
