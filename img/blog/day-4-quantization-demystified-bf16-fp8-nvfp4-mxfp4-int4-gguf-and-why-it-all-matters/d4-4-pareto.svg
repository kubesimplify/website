<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="1160" viewBox="0 0 1650 1160">
  <defs>
    <linearGradient id="greenBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#76b900"/><stop offset="1" stop-color="#05caff"/></linearGradient>
    <linearGradient id="purpleGreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#76b900"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <text x="825" y="78" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="900" fill="#172033" text-anchor="middle">Quality vs size: the practical Pareto curve</text>
  <text x="825" y="120" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="23" font-weight="500" fill="#64748b" text-anchor="middle">Directional, not a universal benchmark. Exact quality depends on model, task, calibration, and engine.</text>
  <line x1="180" y1="900" x2="1420" y2="900" stroke="#334155" stroke-width="4" stroke-linecap="round"/><line x1="180" y1="900" x2="180" y2="230" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <text x="1420" y="950" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#475569" text-anchor="end">larger bytes / param</text>
  <text x="120" y="245" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#475569" text-anchor="start">higher quality</text>
  <line x1="1280" y1="310" x2="1280" y2="310" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="1280" cy="310" r="18" fill="#ef4444"/><text x="1308" y="304" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">FP32</text><text x="1308" y="335" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">reference</text>
<line x1="1110" y1="355" x2="1110" y2="355" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="1110" cy="355" r="18" fill="#f59e0b"/><text x="1138" y="349" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">BF16</text><text x="1138" y="380" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">safe baseline</text>
<line x1="780" y1="405" x2="780" y2="405" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="780" cy="405" r="18" fill="#3b82f6"/><text x="808" y="399" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">FP8</text><text x="808" y="430" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">often very close</text>
<line x1="500" y1="500" x2="500" y2="500" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="500" cy="500" r="18" fill="#76b900"/><text x="528" y="494" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">NVFP4</text><text x="528" y="525" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">4-bit sweet spot on Blackwell</text>
<line x1="470" y1="575" x2="470" y2="575" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="470" cy="575" r="18" fill="#8b5cf6"/><text x="498" y="569" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">MXFP4</text><text x="498" y="600" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">cross-vendor FP4</text>
<line x1="510" y1="630" x2="510" y2="630" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="510" cy="630" r="18" fill="#ec4899"/><text x="538" y="624" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">Q4_K_M</text><text x="538" y="655" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">local default</text>
<line x1="430" y1="710" x2="430" y2="710" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="430" cy="710" r="18" fill="#64748b"/><text x="458" y="704" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">INT4</text><text x="458" y="735" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">depends on calibration</text>
<line x1="330" y1="820" x2="330" y2="820" stroke="#fff" stroke-width="1" stroke-linecap="round"/><circle cx="330" cy="820" r="18" fill="#f97316"/><text x="358" y="814" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="900" fill="#172033">IQ3_XXS</text><text x="358" y="845" font-family="Inter, ui-sans-serif, system-ui" font-size="19" fill="#64748b">quality drops faster</text>
  <path d="M330 820 C410 675, 505 530, 780 405 C1000 340, 1170 320, 1280 310" fill="none" stroke="url(#purpleGreen)" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <rect x="240" y="955" width="1210" height="95" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="280" y="1012" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="850" fill="#0f172a" text-anchor="start">Spark rule of thumb: use BF16 for training, NVFP4 for supported Blackwell serving, GGUF Q4_K_M for easy local use.</text>

</svg>