<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Local Wandler demo results</title>
  <desc id="desc">Hand drawn style diagram showing the local M1 Max WebGPU demo and measured results.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .paper { fill: #fffdf7; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .ghost { fill: none; stroke: #111827; stroke-width: 1.3; opacity: .45; }
      .blue { fill: #e8f3ff; }
      .green { fill: #eaf8ed; }
      .yellow { fill: #fff1d6; }
      .text { font: 25px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; fill: #111827; }
      .small { font: 18px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; fill: #374151; }
      .num { font: 32px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; font-weight: 700; fill: #111827; }
      .arrow { fill: none; stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="paper" width="1200" height="720"/>
  <text class="text" x="70" y="70">Local test: M1 Max, 64 GB unified memory, Wandler 2.6.4</text>

  <g transform="translate(80 130)">
    <rect class="box blue" x="0" y="0" width="260" height="150" rx="14"/>
    <rect class="ghost" x="5" y="-5" width="260" height="150" rx="16"/>
    <text class="text" x="24" y="45">Mac runtime</text>
    <text class="small" x="24" y="80">Node v22.5.1</text>
    <text class="small" x="24" y="108">macOS 26.2</text>
    <text class="small" x="24" y="136">arm64 Apple GPU</text>
  </g>

  <g transform="translate(435 130)">
    <rect class="box yellow" x="0" y="0" width="300" height="150" rx="14"/>
    <rect class="ghost" x="-5" y="5" width="300" height="150" rx="16"/>
    <text class="text" x="24" y="45">Wandler server</text>
    <text class="small" x="24" y="80">LFM2.5 350M q4</text>
    <text class="small" x="24" y="108">device=webgpu</text>
    <text class="small" x="24" y="136">backend=wandler</text>
  </g>

  <g transform="translate(840 130)">
    <rect class="box green" x="0" y="0" width="280" height="150" rx="14"/>
    <rect class="ghost" x="5" y="-5" width="280" height="150" rx="16"/>
    <text class="text" x="24" y="45">WebGPU proof</text>
    <text class="small" x="24" y="80">ORT WebGPU context</text>
    <text class="small" x="24" y="108">Apple device found</text>
    <text class="small" x="24" y="136">CPU helper nodes too</text>
  </g>

  <path class="arrow" d="M342 205 C380 202 400 202 435 205"/>
  <path class="arrow" d="M737 205 C778 202 800 202 840 205"/>

  <g transform="translate(90 390)">
    <rect class="box" x="0" y="0" width="250" height="135" rx="14"/>
    <rect class="ghost" x="5" y="4" width="250" height="135" rx="16"/>
    <text class="small" x="24" y="36">cached load</text>
    <text class="num" x="24" y="82">2.4s</text>
    <text class="small" x="24" y="112">warmup: 205ms</text>
  </g>

  <g transform="translate(430 390)">
    <rect class="box" x="0" y="0" width="250" height="135" rx="14"/>
    <rect class="ghost" x="-5" y="-4" width="250" height="135" rx="16"/>
    <text class="small" x="24" y="36">5-run average</text>
    <text class="num" x="24" y="82">410ms</text>
    <text class="small" x="24" y="112">117 tok/s</text>
  </g>

  <g transform="translate(770 390)">
    <rect class="box" x="0" y="0" width="250" height="135" rx="14"/>
    <rect class="ghost" x="4" y="5" width="250" height="135" rx="16"/>
    <text class="small" x="24" y="36">server metrics</text>
    <text class="num" x="24" y="82">400ms</text>
    <text class="small" x="24" y="112">avg latency, 0 errors</text>
  </g>

  <text class="small" x="90" y="610">Numbers are for LiquidAI/LFM2.5-350M-ONNX:q4 on June 3, 2026.</text>
  <text class="small" x="90" y="640">The first uncached/debug run loaded in 29.6s and proved WebGPU context creation.</text>
</svg>
