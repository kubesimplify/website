<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Wandler architecture</title>
  <desc id="desc">Hand drawn style architecture diagram showing a client calling Wandler, which loads models through Transformers.js and ONNX Runtime onto WebGPU or CPU.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .paper { fill: #fffdf7; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .box2 { fill: none; stroke: #1f2937; stroke-width: 1.4; opacity: .45; }
      .accent { fill: #e8f3ff; }
      .accent2 { fill: #fff1d6; }
      .accent3 { fill: #eaf8ed; }
      .text { font: 26px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; fill: #111827; }
      .small { font: 19px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; fill: #374151; }
      .tiny { font: 16px "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive; fill: #4b5563; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="paper" width="1200" height="760"/>
  <path d="M40 40 C210 25 385 45 560 34 C760 21 960 39 1160 28 L1168 718 C880 740 620 715 345 731 C225 738 105 726 37 718 Z" fill="#fff9e8" stroke="#ead7a8" stroke-width="2"/>

  <g transform="translate(70 130)">
    <rect class="box accent" x="0" y="0" width="240" height="130" rx="14"/>
    <rect class="box2" x="5" y="-4" width="240" height="130" rx="16"/>
    <text class="text" x="28" y="45">App / Agent</text>
    <text class="small" x="28" y="80">OpenAI SDK</text>
    <text class="small" x="28" y="108">curl, LangChain, AI SDK</text>
  </g>

  <g transform="translate(420 115)">
    <rect class="box accent2" x="0" y="0" width="290" height="160" rx="14"/>
    <rect class="box2" x="-5" y="5" width="290" height="160" rx="16"/>
    <text class="text" x="28" y="45">Wandler Server</text>
    <text class="small" x="28" y="82">Hono HTTP routes</text>
    <text class="small" x="28" y="112">auth, CORS, queue</text>
    <text class="small" x="28" y="140">metrics and health</text>
  </g>

  <g transform="translate(825 115)">
    <rect class="box accent3" x="0" y="0" width="280" height="160" rx="14"/>
    <rect class="box2" x="6" y="-5" width="280" height="160" rx="16"/>
    <text class="text" x="26" y="45">Model Manager</text>
    <text class="small" x="26" y="82">loads tokenizer</text>
    <text class="small" x="26" y="112">loads ONNX weights</text>
    <text class="small" x="26" y="140">sets cache and dtype</text>
  </g>

  <g transform="translate(410 410)">
    <rect class="box" x="0" y="0" width="295" height="135" rx="14"/>
    <rect class="box2" x="7" y="5" width="295" height="135" rx="16"/>
    <text class="text" x="26" y="45">Transformers.js</text>
    <text class="small" x="26" y="82">chat templates</text>
    <text class="small" x="26" y="110">generate() and pipelines</text>
  </g>

  <g transform="translate(820 405)">
    <rect class="box" x="0" y="0" width="285" height="145" rx="14"/>
    <rect class="box2" x="-6" y="6" width="285" height="145" rx="16"/>
    <text class="text" x="26" y="45">ONNX Runtime</text>
    <text class="small" x="26" y="82">execution provider</text>
    <text class="small" x="26" y="112">WebGPU / CPU / WASM</text>
  </g>

  <g transform="translate(170 470)">
    <rect class="box" x="0" y="0" width="205" height="105" rx="14"/>
    <rect class="box2" x="4" y="-4" width="205" height="105" rx="16"/>
    <text class="text" x="28" y="42">HF Cache</text>
    <text class="small" x="28" y="76">~/.cache/huggingface</text>
  </g>

  <path class="arrow" d="M312 193 C352 190 372 190 410 192"/>
  <path class="arrow" d="M712 194 C752 192 778 192 820 193"/>
  <path class="arrow" d="M960 278 C920 345 820 378 706 431"/>
  <path class="arrow" d="M705 475 C748 474 777 474 820 474"/>
  <path class="arrow dash" d="M820 520 C660 650 440 650 376 555"/>
  <path class="arrow dash" d="M374 507 C393 492 397 487 410 480"/>

  <text class="tiny" x="330" y="175">HTTP /v1/chat/completions</text>
  <text class="tiny" x="735" y="174">load once at startup</text>
  <text class="tiny" x="845" y="595">model files reused between runs</text>
  <text class="tiny" x="520" y="385">format, tokenize, run model</text>
</svg>
