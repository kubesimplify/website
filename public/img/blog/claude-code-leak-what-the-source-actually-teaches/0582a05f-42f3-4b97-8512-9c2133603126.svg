  <rect x="620" y="659" width="175" height="26" rx="5" fill="#5c1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="637" y="677" font-size="12" fill="#e2e8f0">Reactive Compact</text>
  <rect x="808" y="659" width="50" height="18" rx="4" fill="#5c3d1a" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="816" y="672" font-size="9" fill="#f59e0b">FLAG</text>

