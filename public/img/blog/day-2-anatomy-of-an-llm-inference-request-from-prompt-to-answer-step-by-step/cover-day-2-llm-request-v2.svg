<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fffb"/>
      <stop offset="0.55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cff68"/>
      <stop offset="1" stop-color="#05caff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 58px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: -1px; }
      .subtitle { font: 500 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .eyebrow { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0369a1; letter-spacing: 2.5px; }
      .label { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mono { font: 700 20px "SF Mono", "Cascadia Code", Menlo, monospace; fill: #0f172a; }
      .footer { font: 700 20px "SF Mono", "Cascadia Code", Menlo, monospace; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 0 H1200 V18 H0 Z" fill="url(#accent)"/>
  <circle cx="1025" cy="120" r="190" fill="#05caff" opacity="0.08"/>
  <circle cx="1035" cy="485" r="230" fill="#5cff68" opacity="0.08"/>
  <circle cx="200" cy="540" r="170" fill="#05caff" opacity="0.06"/>

  <g transform="translate(72 78)">
    <text class="eyebrow" x="0" y="0">7 DAYS OF DGX SPARK - DAY 2</text>
    <text class="title" x="0" y="74">Anatomy of an</text>
    <text class="title" x="0" y="140">LLM Inference</text>
    <text class="title" x="0" y="206">Request</text>
    <text class="subtitle" x="0" y="264">From prompt to answer, step by step</text>
  </g>

  <g transform="translate(74 354)">
    <rect x="0" y="0" width="180" height="72" rx="18" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
    <text class="label" x="90" y="34" text-anchor="middle">Prompt</text>
    <text class="small" x="90" y="56" text-anchor="middle">text goes in</text>

    <path d="M190 36 H245" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <path d="M245 36 l-14 -9 v18 z" fill="#0f172a"/>

    <rect x="258" y="0" width="180" height="72" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
    <text class="label" x="348" y="34" text-anchor="middle">Prefill</text>
    <text class="small" x="348" y="56" text-anchor="middle">read in parallel</text>

    <path d="M448 36 H503" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <path d="M503 36 l-14 -9 v18 z" fill="#0f172a"/>

    <rect x="516" y="0" width="180" height="72" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text class="label" x="606" y="34" text-anchor="middle">KV Cache</text>
    <text class="small" x="606" y="56" text-anchor="middle">memory grows</text>

    <path d="M706 36 H761" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <path d="M761 36 l-14 -9 v18 z" fill="#0f172a"/>

    <rect x="774" y="0" width="180" height="72" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text class="label" x="864" y="34" text-anchor="middle">Decode</text>
    <text class="small" x="864" y="56" text-anchor="middle">one token at a time</text>
  </g>

  <g transform="translate(760 118)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="190" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <text class="mono" x="34" y="54">TTFT = prefill time</text>
    <rect x="34" y="80" width="138" height="32" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text class="small" x="103" y="102" text-anchor="middle">compute-bound</text>
    <text class="mono" x="34" y="146">tok/s = decode speed</text>
    <rect x="34" y="164" width="178" height="32" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text class="small" x="123" y="186" text-anchor="middle">bandwidth-bound</text>
  </g>

  <g transform="translate(74 514)">
    <rect x="0" y="0" width="1052" height="58" rx="18" fill="#0f172a"/>
    <text class="footer" x="34" y="37">DGX Spark: 128 GB unified memory - 273 GB/s bandwidth - local LLM serving</text>
  </g>
</svg>
