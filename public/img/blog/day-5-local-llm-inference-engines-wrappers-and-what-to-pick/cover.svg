<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Day 5 local LLM inference engines cover</title>
  <desc id="desc">Cover art showing the same local LLM served through Ollama, llama.cpp, Docker Model Runner, vLLM, SGLang, and TensorRT-LLM on DGX Spark.</desc>
  <rect width="1200" height="630" fill="#07111f"/>
  <circle cx="1020" cy="95" r="220" fill="#76B900" opacity="0.14"/>
  <circle cx="118" cy="560" r="260" fill="#0ea5e9" opacity="0.14"/>
