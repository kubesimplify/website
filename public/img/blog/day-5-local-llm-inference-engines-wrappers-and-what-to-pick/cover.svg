    <text x="0" y="330" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#CBD5E1">Same Qwen model. Six serving paths.</text>
    <text x="0" y="366" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#CBD5E1">From first token to production throughput</text>
    <text x="0" y="488" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#F8FAFC">Kubesimplify</text>
  </g>

  <g transform="translate(690 118)">
