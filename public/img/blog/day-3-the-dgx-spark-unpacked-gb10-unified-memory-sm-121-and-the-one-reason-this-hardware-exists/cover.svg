<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Day 3: The DGX Spark Unpacked</title>
  <desc id="desc">Cover art showing the GB10 Grace Blackwell Superchip package with Grace CPU, Blackwell GPU, unified LPDDR5x memory, and key specs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="0.5" stop-color="#0f1620"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7ff55"/>
      <stop offset="1" stop-color="#76b900"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf66"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="grace-die" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a4f"/>
      <stop offset="1" stop-color="#0c1b26"/>
    </linearGradient>
    <linearGradient id="black-die" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4d10"/>
      <stop offset="1" stop-color="#1a2406"/>
    </linearGradient>
    <linearGradient id="package" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="1" stop-color="#0c1118"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 92C140 138 268 124 392 76C544 17 700 19 854 80C998 137 1062 137 1200 92V0H0Z" fill="#76b900" opacity="0.05"/>
  <path d="M0 498C162 458 264 528 408 481C566 430 612 296 794 308C966 320 1058 448 1200 401V630H0Z" fill="#f97316" opacity="0.06"/>

  <!-- LEFT: title block -->
  <g transform="translate(72 78)">
    <g>
      <rect x="0" y="0" width="148" height="34" rx="17" fill="#76b900" fill-opacity="0.16" stroke="#76b900" stroke-opacity="0.65"/>
      <text x="74" y="23" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#b7ff55">DAY 3</text>
    </g>

    <text x="0" y="100" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" fill="#f8fafc" letter-spacing="-1.5">The DGX Spark,</text>
    <text x="0" y="170" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" fill="#f8fafc" letter-spacing="-1.5">Unpacked.</text>
    <text x="0" y="226" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#cbd5e1">GB10 . Unified Memory . sm_121 . NVFP4</text>

    <!-- spec lozenges -->
    <g transform="translate(0 280)">
      <rect x="0" y="0" width="172" height="58" rx="14" fill="#0f1720" fill-opacity="0.85" stroke="#76b900" stroke-opacity="0.55" stroke-width="2"/>
      <text x="86" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1.5">UNIFIED MEMORY</text>
      <text x="86" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#b7ff55">128 GB</text>
    </g>
    <g transform="translate(186 280)">
      <rect x="0" y="0" width="172" height="58" rx="14" fill="#0f1720" fill-opacity="0.85" stroke="#f97316" stroke-opacity="0.55" stroke-width="2"/>
      <text x="86" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1.5">DECODE CEILING</text>
      <text x="86" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#ffcf66">273 GB/s</text>
    </g>
    <g transform="translate(372 280)">
      <rect x="0" y="0" width="172" height="58" rx="14" fill="#0f1720" fill-opacity="0.85" stroke="#0ea5e9" stroke-opacity="0.55" stroke-width="2"/>
      <text x="86" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1.5">COMPUTE CAP</text>
      <text x="86" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#7dd3fc">sm_121</text>
    </g>

    <g transform="translate(0 366)">
      <rect x="0" y="0" width="544" height="74" rx="18" fill="#0f1720" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="31" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="17" fill="#b7ff55">$ deviceQuery</text>
      <text x="24" y="58" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="14" fill="#94a3b8">Device 0: "NVIDIA GB10"  .  CUDA Cap 12.1  .  48 SMs</text>
    </g>
  </g>

  <!-- RIGHT: GB10 package illustration -->
  <g transform="translate(720 100)" filter="url(#shadow)">
    <!-- substrate / package -->
    <rect x="0" y="0" width="430" height="386" rx="32" fill="url(#package)" stroke="#ffffff" stroke-opacity="0.14"/>

    <!-- LPDDR5x memory chips around the perimeter, top row -->
    <g fill="#1f2937" stroke="#475569" stroke-width="1.2">
      <rect x="30" y="22" width="58" height="22" rx="3"/>
      <rect x="96" y="22" width="58" height="22" rx="3"/>
      <rect x="162" y="22" width="58" height="22" rx="3"/>
      <rect x="228" y="22" width="58" height="22" rx="3"/>
      <rect x="294" y="22" width="58" height="22" rx="3"/>
      <rect x="360" y="22" width="40" height="22" rx="3"/>
    </g>
    <text x="215" y="14" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#64748b" letter-spacing="2">LPDDR5X . 256-BIT . 273 GB/s</text>

    <!-- bottom row LPDDR -->
    <g fill="#1f2937" stroke="#475569" stroke-width="1.2">
      <rect x="30" y="342" width="58" height="22" rx="3"/>
      <rect x="96" y="342" width="58" height="22" rx="3"/>
      <rect x="162" y="342" width="58" height="22" rx="3"/>
      <rect x="228" y="342" width="58" height="22" rx="3"/>
      <rect x="294" y="342" width="58" height="22" rx="3"/>
      <rect x="360" y="342" width="40" height="22" rx="3"/>
    </g>

    <!-- Grace CPU die (left) -->
    <g transform="translate(50 76)">
      <rect x="0" y="0" width="148" height="180" rx="10" fill="url(#grace-die)" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="2"/>
      <!-- core grid inside Grace -->
      <g fill="#7dd3fc" fill-opacity="0.18" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="0.8">
        <rect x="12" y="20" width="28" height="22" rx="2"/>
        <rect x="44" y="20" width="28" height="22" rx="2"/>
        <rect x="76" y="20" width="28" height="22" rx="2"/>
        <rect x="108" y="20" width="28" height="22" rx="2"/>
        <rect x="12" y="46" width="28" height="22" rx="2"/>
        <rect x="44" y="46" width="28" height="22" rx="2"/>
        <rect x="76" y="46" width="28" height="22" rx="2"/>
        <rect x="108" y="46" width="28" height="22" rx="2"/>
        <rect x="12" y="72" width="28" height="22" rx="2"/>
        <rect x="44" y="72" width="28" height="22" rx="2"/>
        <rect x="76" y="72" width="28" height="22" rx="2"/>
        <rect x="108" y="72" width="28" height="22" rx="2"/>
        <rect x="12" y="98" width="28" height="22" rx="2"/>
        <rect x="44" y="98" width="28" height="22" rx="2"/>
        <rect x="76" y="98" width="28" height="22" rx="2"/>
        <rect x="108" y="98" width="28" height="22" rx="2"/>
        <rect x="12" y="124" width="28" height="22" rx="2"/>
        <rect x="44" y="124" width="28" height="22" rx="2"/>
        <rect x="76" y="124" width="28" height="22" rx="2"/>
        <rect x="108" y="124" width="28" height="22" rx="2"/>
      </g>
      <rect x="0" y="0" width="148" height="180" rx="10" fill="none" stroke="#7dd3fc" stroke-opacity="0.85" stroke-width="2"/>
      <text x="74" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#7dd3fc" letter-spacing="0.5">GRACE  CPU</text>
      <text x="74" y="-8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#cbd5e1">20 ARM cores . X925 + A725</text>
    </g>

    <!-- NVLink C2C interconnect -->
    <g transform="translate(198 124)">
      <rect x="0" y="20" width="34" height="84" rx="4" fill="#0f1720" stroke="#facc15" stroke-opacity="0.8" stroke-width="1.5"/>
      <!-- traces -->
      <g stroke="#facc15" stroke-width="1.5" stroke-opacity="0.85">
        <line x1="0" y1="38" x2="34" y2="38"/>
        <line x1="0" y1="50" x2="34" y2="50"/>
        <line x1="0" y1="62" x2="34" y2="62"/>
        <line x1="0" y1="74" x2="34" y2="74"/>
        <line x1="0" y1="86" x2="34" y2="86"/>
      </g>
      <text x="17" y="14" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="900" fill="#facc15" letter-spacing="0.8">NVLINK</text>
      <text x="17" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="900" fill="#facc15" letter-spacing="0.8">C2C</text>
    </g>

    <!-- Blackwell GPU die (right) -->
    <g transform="translate(232 76)">
      <rect x="0" y="0" width="148" height="180" rx="10" fill="url(#black-die)" stroke="#b7ff55" stroke-opacity="0.55" stroke-width="2"/>
      <!-- SM grid inside Blackwell - 8x6 = 48 -->
      <g fill="#b7ff55" fill-opacity="0.22" stroke="#76b900" stroke-opacity="0.55" stroke-width="0.7">
        <!-- row 1 -->
        <rect x="10" y="14" width="14" height="22" rx="1.5"/>
        <rect x="28" y="14" width="14" height="22" rx="1.5"/>
        <rect x="46" y="14" width="14" height="22" rx="1.5"/>
        <rect x="64" y="14" width="14" height="22" rx="1.5"/>
        <rect x="82" y="14" width="14" height="22" rx="1.5"/>
        <rect x="100" y="14" width="14" height="22" rx="1.5"/>
        <rect x="118" y="14" width="14" height="22" rx="1.5"/>
        <rect x="136" y="14" width="6" height="22" rx="1.5"/>
        <!-- row 2 -->
        <rect x="10" y="40" width="14" height="22" rx="1.5"/>
        <rect x="28" y="40" width="14" height="22" rx="1.5"/>
        <rect x="46" y="40" width="14" height="22" rx="1.5"/>
        <rect x="64" y="40" width="14" height="22" rx="1.5"/>
        <rect x="82" y="40" width="14" height="22" rx="1.5"/>
        <rect x="100" y="40" width="14" height="22" rx="1.5"/>
        <rect x="118" y="40" width="14" height="22" rx="1.5"/>
        <rect x="136" y="40" width="6" height="22" rx="1.5"/>
        <!-- row 3 -->
        <rect x="10" y="66" width="14" height="22" rx="1.5"/>
        <rect x="28" y="66" width="14" height="22" rx="1.5"/>
        <rect x="46" y="66" width="14" height="22" rx="1.5"/>
        <rect x="64" y="66" width="14" height="22" rx="1.5"/>
        <rect x="82" y="66" width="14" height="22" rx="1.5"/>
        <rect x="100" y="66" width="14" height="22" rx="1.5"/>
        <rect x="118" y="66" width="14" height="22" rx="1.5"/>
        <rect x="136" y="66" width="6" height="22" rx="1.5"/>
        <!-- row 4 -->
        <rect x="10" y="92" width="14" height="22" rx="1.5"/>
        <rect x="28" y="92" width="14" height="22" rx="1.5"/>
        <rect x="46" y="92" width="14" height="22" rx="1.5"/>
        <rect x="64" y="92" width="14" height="22" rx="1.5"/>
        <rect x="82" y="92" width="14" height="22" rx="1.5"/>
        <rect x="100" y="92" width="14" height="22" rx="1.5"/>
        <rect x="118" y="92" width="14" height="22" rx="1.5"/>
        <rect x="136" y="92" width="6" height="22" rx="1.5"/>
        <!-- row 5 -->
        <rect x="10" y="118" width="14" height="22" rx="1.5"/>
        <rect x="28" y="118" width="14" height="22" rx="1.5"/>
        <rect x="46" y="118" width="14" height="22" rx="1.5"/>
        <rect x="64" y="118" width="14" height="22" rx="1.5"/>
        <rect x="82" y="118" width="14" height="22" rx="1.5"/>
        <rect x="100" y="118" width="14" height="22" rx="1.5"/>
        <rect x="118" y="118" width="14" height="22" rx="1.5"/>
        <rect x="136" y="118" width="6" height="22" rx="1.5"/>
        <!-- row 6 -->
        <rect x="10" y="144" width="14" height="22" rx="1.5"/>
        <rect x="28" y="144" width="14" height="22" rx="1.5"/>
        <rect x="46" y="144" width="14" height="22" rx="1.5"/>
        <rect x="64" y="144" width="14" height="22" rx="1.5"/>
        <rect x="82" y="144" width="14" height="22" rx="1.5"/>
        <rect x="100" y="144" width="14" height="22" rx="1.5"/>
        <rect x="118" y="144" width="14" height="22" rx="1.5"/>
        <rect x="136" y="144" width="6" height="22" rx="1.5"/>
      </g>
      <rect x="0" y="0" width="148" height="180" rx="10" fill="none" stroke="#b7ff55" stroke-opacity="0.9" stroke-width="2"/>
      <text x="74" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#b7ff55" letter-spacing="0.5">BLACKWELL  GPU</text>
      <text x="74" y="-8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#cbd5e1">48 SMs . 6,144 CUDA . NVFP4</text>
    </g>

    <!-- footnote inside package -->
    <text x="215" y="296" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#94a3b8" letter-spacing="1.2">ONE PACKAGE  .  ONE MEMORY POOL</text>
    <text x="215" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#64748b">TSMC 3nm  .  GB10 Grace Blackwell Superchip</text>
  </g>

  <!-- bottom-left series badge -->
  <g transform="translate(72 558)">
    <rect x="0" y="0" width="260" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="130" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#e2e8f0">7 DAYS OF DGX SPARK</text>
  </g>
  <text x="1130" y="588" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#76b900">KubeSimplify</text>
</svg>
